context:
  name: pyrefly
  version: "1.0.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/facebook/${{ name }}/archive/refs/tags/${{ version }}.tar.gz
  sha256: a92476d5922edaf511020f8edaffaed91afeef64e0040f51a43151efa715136a

build:
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - cd pyrefly
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml
  number: 1

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
    - cargo-auditable
    - make

tests:
  - script: pyrefly --help
  - package_contents:
      bin:
        - pyrefly
      strict: true

about:
  homepage: http://pyrefly.org
  summary: A fast type checker and IDE for Python
  description: |
    Pyrefly is a fast type checker for Python. It's designed to replace the existing Pyre type checker at Meta by the end of 2025. This README describes basic usage. See the Pyrefly website for full documentation and a tool for checking code.
  license: MIT
  license_file:
    - LICENSE
    - pyrefly/THIRDPARTY.yml
  documentation: https://pyrefly.org/en/docs/
  repository: https://github.com/facebook/pyrefly

extra:
  recipe-maintainers:
    - pavelzw
